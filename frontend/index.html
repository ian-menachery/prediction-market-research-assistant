<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PMRA — Prediction Market Research Assistant</title>
  <!-- React via CDN — no build pipeline (per CLAUDE.md). Versions are PINNED on purpose:
       unpinned @babel/standalone drifted to a build whose React preset defaults to the
       automatic JSX runtime (emits `import "react/jsx-runtime"`), which the in-browser
       transformer can't run as a classic script — blanking the whole app. 7.26.4 is the
       last release that keeps the classic runtime here. -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
  <style>
    :root {
      --bg: #f6f7f9; --card: #ffffff; --ink: #1c2024; --muted: #6b7280;
      --line: #e5e7eb; --accent: #2563eb;
      --green: #1a7f37; --green-bg: #e8f5ec;
      --red: #cf222e; --red-bg: #fdeced;
      --gray: #6b7280; --gray-bg: #f0f1f3;
      --warn: #92610a; --warn-bg: #fff4e0;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--ink);
      font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    header { position: sticky; top: 0; z-index: 5; background: var(--card);
      border-bottom: 1px solid var(--line); padding: 14px 20px; }
    .header-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    h1 { font-size: 18px; margin: 0; }
    h1 small { color: var(--muted); font-weight: 400; font-size: 13px; }
    .tabs { display: flex; gap: 4px; }
    .tab { font-size: 13px; padding: 6px 13px; border-radius: 7px; border: 1px solid var(--line);
      background: var(--card); cursor: pointer; }
    .tab.active { background: var(--ink); color: #fff; border-color: var(--ink); }
    .controls { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-left: auto; }
    label.ctl { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
    select, input[type=range], input[type=number] { font: inherit; }
    button { font: inherit; cursor: pointer; border: 1px solid var(--line);
      background: var(--card); border-radius: 7px; padding: 7px 13px; }
    button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    button:disabled { opacity: .55; cursor: default; }

    .chips { display: flex; gap: 7px; flex-wrap: wrap; padding: 10px 20px 0; }
    .chip { font-size: 12px; padding: 4px 11px; border-radius: 999px;
      border: 1px solid var(--line); background: var(--card); cursor: pointer; color: var(--muted); }
    .chip.active { background: var(--ink); color: #fff; border-color: var(--ink); }

    main { padding: 16px 20px 60px; }
    .meta-line { color: var(--muted); font-size: 13px; margin: 4px 20px 0; }
    .grid { display: grid; gap: 14px; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); }

    .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px;
      padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .card .tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag { font-size: 11px; color: var(--muted); background: var(--gray-bg);
      padding: 2px 8px; border-radius: 6px; }
    .tag.exch { font-weight: 700; text-transform: capitalize; }
    .tag.exch.polymarket { color: #7c3aed; background: #ede9fe; }
    .tag.exch.kalshi { color: #16a34a; background: #dcfce7; }
    .hist-toggle { cursor: pointer; color: var(--muted); user-select: none; }
    .hist-toggle:hover { color: var(--fg); }
    .history { display: flex; flex-direction: column; gap: 4px; padding: 8px 10px;
      background: var(--gray-bg); border-radius: 7px; }
    .hist-row { display: flex; gap: 10px; font-size: 12px; align-items: baseline; }
    .hist-date { color: var(--muted); min-width: 80px; }
    .q { font-weight: 600; font-size: 15px; }
    .stats { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
    .prob { font-size: 30px; font-weight: 700; line-height: 1; }
    .prob small { font-size: 13px; font-weight: 400; color: var(--muted); }
    .kv { font-size: 12.5px; color: var(--muted); }
    .kv b { color: var(--ink); font-weight: 600; }

    .divergence { display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      padding: 9px 0; border-top: 1px dashed var(--line); }
    .arrow { font-size: 14px; }
    .badge { font-size: 13px; font-weight: 700; padding: 3px 9px; border-radius: 7px; }
    .badge.up { color: var(--green); background: var(--green-bg); }
    .badge.down { color: var(--red); background: var(--red-bg); }
    .badge.fair { color: var(--gray); background: var(--gray-bg); }
    .edge-label { font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); }

    .factors { display: flex; gap: 6px; flex-wrap: wrap; }
    .factor { font-size: 11.5px; background: #eef2ff; color: #3538cd; padding: 3px 8px; border-radius: 6px; }
    .summary { font-size: 13.5px; color: #374151; }
    .conf { font-size: 12px; color: var(--muted); }
    .disclaimer { font-size: 11px; color: #9aa1ab; font-style: italic; }
    .err { font-size: 12.5px; color: var(--red); background: var(--red-bg); padding: 6px 9px; border-radius: 7px; }
    .row-end { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .spinner { width: 13px; height: 13px; border: 2px solid #fff; border-top-color: transparent;
      border-radius: 50%; display: inline-block; animation: spin .7s linear infinite; vertical-align: -2px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; color: var(--muted); padding: 60px 20px; }

    /* Scanner */
    .scan-form { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end;
      background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 16px; }
    .scan-form label { display: flex; flex-direction: column; font-size: 12px; color: var(--muted); gap: 4px; }
    .scan-form input, .scan-form select { padding: 6px 8px; border: 1px solid var(--line); border-radius: 6px; width: 130px; }
    .warn { font-size: 12.5px; color: var(--warn); background: var(--warn-bg);
      border: 1px solid #f2d699; padding: 8px 11px; border-radius: 8px; margin: 12px 0; }
    .table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 12px; background: var(--card); }
    table.scan { border-collapse: collapse; width: 100%; font-size: 13px; }
    table.scan th, table.scan td { padding: 9px 11px; text-align: right; white-space: nowrap; border-bottom: 1px solid var(--line); }
    table.scan th { color: var(--muted); font-weight: 600; font-size: 11.5px; text-transform: uppercase; letter-spacing: .03em; }
    table.scan td.q-cell, table.scan th.q-cell { text-align: left; white-space: normal; min-width: 260px; max-width: 380px; }
    table.scan tr:last-child td { border-bottom: none; }
    .side { font-weight: 700; font-size: 12px; padding: 2px 7px; border-radius: 6px; }
    .side.yes { color: var(--green); background: var(--green-bg); }
    .side.no { color: var(--red); background: var(--red-bg); }
    .ann { font-weight: 700; }
    .basis-exec { font-size: 11px; font-weight: 700; color: var(--green); background: var(--green-bg); padding: 2px 7px; border-radius: 6px; }
    .basis-mid  { font-size: 11px; color: var(--muted); background: var(--gray-bg); padding: 2px 7px; border-radius: 6px; }
    .dim { color: var(--muted); font-size: 11px; cursor: help; }
    .stale-badge { font-size: 12px; color: var(--warn); background: var(--warn-bg);
      border: 1px solid #f2d699; padding: 5px 9px; border-radius: 7px; }
    .v-holds   { font-size: 11px; font-weight: 700; color: var(--green); background: var(--green-bg); padding: 2px 7px; border-radius: 6px; cursor: help; }
    .v-refuted { font-size: 11px; font-weight: 700; color: var(--red); background: var(--red-bg); padding: 2px 7px; border-radius: 6px; cursor: help; }
    .v-model   { display: block; font-size: 9px; color: var(--muted); margin-top: 2px; }

    /* Calibration */
    .cal-head { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
    .cal-note { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
    .cal-grid { display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-start; }
    .reliability { background: var(--card); border: 1px solid var(--line); border-radius: 12px; }
    .axis { font-size: 10px; fill: var(--muted); }
    .cal-section { border-top: 1px solid var(--line); padding-top: 16px; margin-top: 16px; }
    .cal-section:first-of-type { border-top: none; margin-top: 0; padding-top: 0; }
    .cal-model { font-weight: 700; font-size: 14px; }

    /* Provider */
    .provider-chip { font-size: 12px; color: var(--muted); background: var(--gray-bg);
      padding: 4px 10px; border-radius: 999px; margin-left: 10px; }
    .banner-exhausted { margin-top: 10px; background: var(--red-bg); color: var(--red);
      border: 1px solid #f5b5bb; border-radius: 8px; padding: 9px 12px; font-size: 13px; }
    .banner-exhausted code { background: rgba(0,0,0,.06); padding: 1px 5px; border-radius: 4px; }

    /* Trade ticket / record-fill (Signals tab) */
    button.mini { font-size: 11px; padding: 2px 7px; border-radius: 6px; }
    button.mini.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .fill-form { display: inline-flex; gap: 4px; align-items: center; }
    .fill-form input { font-size: 11px; padding: 2px 4px; border: 1px solid var(--line); border-radius: 5px; }
    .err-inline { color: var(--red); font-size: 11px; }
    .up { color: var(--green); } .down { color: var(--red); }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- App JS split across files (still no build step): in-browser Babel fetches and
       transforms each text/babel script in order; they share one global scope. -->
  <script type="text/babel" src="/js/api.js"></script>
  <script type="text/babel" src="/js/views.js"></script>
  <script type="text/babel" src="/js/app.js"></script>
</body>
</html>
