name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies (pinned)
        run: pip install -r requirements.lock -r requirements-dev.lock

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Test (pytest)
        run: pytest -q
