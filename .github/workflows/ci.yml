name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies (pinned)
        run: pip install -r requirements.lock -r requirements-dev.lock

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Type-check (mypy)
        run: mypy src

      - name: Test (pytest + coverage)
        run: pytest -q --cov=research --cov-report=term-missing --cov-fail-under=55

      - name: Dependency CVE scan (pip-audit)
        # Advisory: reports known CVEs in the pinned set without blocking the build (transitive
        # CVEs are often unfixable here). Dependabot opens the actual upgrade PRs.
        continue-on-error: true
        run: pip-audit -r requirements.lock -r requirements-dev.lock
